<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Star Stalker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #0a1f2e 0%, #0a2f3f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }
        .game-container {
            display:flex;
            flex-direction: column;
            align-items: center;
            gap:20px;
        }
        canvas {
            display: block;
            width: 100%;
            max-width: 700px;
            height: auto;
            border-radius: 24px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.3), 0 0 0 4px #f9e45b, 0 0 0 8px #1e2a2e;
            cursor: pointer;
        }
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 40px;
            background: #1e2a2e;
            padding: 12px 32px;
            border-radius: 80px;
            width: 100%;
            max-width: 50px;
        }
        .score-card {
            background: #000000aa;
            padding: 8px 28px;
            border-radius: 50px;
            font-size: 2rem;
            font-weight: bold;
            color: #f9e45b;
            text-shadow: 0 0 6px #ffaa00;
        }
        .restart-btn {
            background: #f9e45b;
            border: none;
            font-size: 1.2rem;
            padding: 8px 24px;
            border-radius: 50px;
            font-family: monospace;
            cursor: pointer;
            box-shadow: 0 4px 0 #ad8e1a;
        }
        .restart-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #ad8e1a;
        }
        .controls {
            font-size: 0.85rem;
            background: #2c3e2b;
            padding: 8px 20px;
            border-radius: 40px;
            color: #f0f2c0;
        }
        @media (max-width: 600px) {
            .score-card { font-size: 1.4rem; padding: 5px 16px; }
            .restart-btn { font-size: 0.9rem; padding: 6px 16px; }
            .controls { font-size: 0.7rem; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="gameCanvas" width="650" height="500"></canvas>
    <div class="info-panel">
        <div class="score-card">⭐ <span id="scoreValue">0</span></div>
        <button class="'restart-btn" id="restartButton">🔄 RESTART</button>
        <div class="controls"> USE ARROWS or MOUSE</div>
    </div>
</div>
<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 650, H = 500;
        canvas.width = W; canvas.height = H;

        const BASKET_W = 70;
        const BASKET_H = 20;
        const ITEM_SIZE = 22;
        let basketX = W/2 - BASKET_W/2;
        const BASKET_Y = H - 40;

        let score = 0;
        let gameRunning = true;
        let frame = 0;
        let speed = 2.5;
        let baseSpeed = 2.5;
        let spawnCounter = 0;
        let spawnDelay = 40;

        let stars = [];
        let bombs = [];

        let mouseX = basketX;

        function updateScoreUI() {
            let x = Math.random() * (W - ITEM_SIZE);
            if(Math.random() < 0.7) {
                stars.push({x: x, y: 0});
            } else {
                bombs.push({x: x, y: 0});
            }
        }

        function resetGame(){
            gameRunning = true;
            score = 0;
            speed = baseSpeed;
            stars = [];
            bombs = [];
            frame = 0;
            spawnCounter = 0;
            basketX = W/2 - BASKET_W/2;
            mouseX = basketX;
            updateScoreUI();
        }

        function checkCollisions() {
            let basketLeft = basketX;
            let basketRight = basketX + BASKET_W;
            let basketTop = BASKET_Y;
            let basketBottom = BASKET_Y + BASKET_H;

            for (let i = 0; i < stars.length; i++){
                let s = stars[i];
                let itemLeft = s.x;
                let itemRight = s.x + ITEM_SIZE;
                let itemTop = s.y;
                let itemBottom = s.y + ITEM_SIZE;
                if (itemRight > basketLeft && itemLeft < basketRight &&
                    itemBottom > basketTop && itemTop < basketBottom) {
                    stars.splice(i,1);
                    score++;
                    updateScoreUI();
                    if (score % 5 === 0 && speed < 6) {
                        speed += 0.2;
                        if (spawnDelay > 20) spawnDelay -=1;
                    }
                    i--;
                }
            }
            for (let i = 0; i < bombs.length; i++){
                let b = bombs[i];
                let itemLeft = b.x;
                let itemRight = b.x+ITEM_SIZE;
                let itemTop = b.y;
                let itemBottom = b.y + ITEM_SIZE;
                if (itemRight > basketLeft && itemLeft < basketRight &&
                    itemBottom > basketTop && itemTop < basketBottom) {
                    gameRunning = false;
                    return;
                }

            }
        }
        function updateItems() {
            for (let i=0; i<stars.length; i++) {
                stars[i].y += speed;
                if (stars[i].y > H){
                    stars.splice(i,1);
                    i--;
                }
            }
            for (let i=0; i<bombs.length; i++) {
                bombs[i].y += speed;
                if (bombs[i].y > H) {
                    bombs.splice(i,1);
                    i--;
                }
            }
            spawnCounter++;
            if (spawnCounter >= spawnDelay) {
                spawnCounter = 0;
                spawnItem();
            }
        }
        function updateGame() {
            if (!gameRunning) return;
            basketX = mouseX;
            if (basketX < 0) basketX = 0;
            if (basketX > W - BASKET_W) basketX = W - BASKET_W;

            checkCollisions();
            updateItems();
        }
        function drawBackground() {
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, '#1a2a3a');
            grad.addColorStop(1, '#2c4c5c');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);
            for (let i=0; i<80; i++) {
                if (i%2 === 0) continue;
                ctx.fillRect((i*23)%W, (i*13)%H, 2,2);
            }
        } 
        function drawBasket() {
            ctx.fillStyle = '#c97e3a';
            ctx.shadowBlur = 4;
            ctx.fillRect(basketX, BASKET_Y, BASKET_W, BASKET_H);
            ctx.fillStyle = '#e5a050';
            for (let i=0; i<4; i++) {
                ctx.fillRect(basketX+10+i*15, BASKET_Y-4, 4, 12);
            }
            ctx.shadowBlur = 0;
        }
        function drawStars() {
            for (let s of stars) {
                ctx.fillStyle = '#ffffffaa'
                for (let i=0; i<80; i++) {
                    if (i%2 === 0) continue;
                    ctx.fillRect((i*23)%W, (i*13)%H, 2,2);
                }
            }
            function drawBasket(){
                ctx.fillStyle = '#c97e3a';
                ctx.shadowBlur = 4;
                ctx.fillRect(basketX, BASKET_Y, BASKET_W, BASKET_H);
                ctx.fillStyle = '#e5a050';
                ctx.fillRect(basketX+5, BASKET_Y-8, BASKET_W-10, 8);
                ctx.fillStyle = '#8b5a2b';
                for (let i=0; i<4; i++) {
                    ctx.fillRect(basketX+10+i*15, BASKET_Y-4, 4, 12);
                }
                ctx.shadowBlur = 0;
            }
        }
    })
